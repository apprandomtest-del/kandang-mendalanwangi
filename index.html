// ── KALKULASI ─────────────────────────────────────────────────
function hitung(rec, popSebelum) {
  const b = rec.batches||[];
  const totalBagus = b.reduce((s,x)=>s+(x.butir||0),0);
  const totalBentes = rec.bentes||0;
  const totalSemua = totalBagus+totalBentes;
  const beratBersih = b.reduce((s,x)=>s+((x.berat||0)-(x.tray||0)*0.205),0);
  const beratPerButir = totalBagus>0?(beratBersih*1000)/totalBagus:0;
  const popSesudah = popSebelum-(rec.ayamMati||0);
  const mortalityRate = popSebelum>0?((rec.ayamMati||0)/popSebelum)*100:0;
  const hd = popSesudah>0?(totalSemua/popSesudah)*100:0;
  const feedIntake = popSesudah>0?((rec.pakan||0)*1000)/popSesudah:0;
  const fcr = beratBersih>0?(rec.pakan||0)/beratBersih:0;
  const stockPeti = beratBersih/10;
  const hargaPakanPerKg = (rec.hargaSak||0)/50;
  const komisi = Math.max(0,0.04*((beratBersih*(rec.hargaDO||0))-((rec.pakan||0)*hargaPakanPerKg)));
  const totalGaji = 70000+komisi;
  return {totalBagus,totalBentes,totalSemua,beratBersih,beratPerButir,popSesudah,popSebelum,mortalityRate,hd,feedIntake,fcr,stockPeti,komisi,totalGaji,hargaPakanPerKg};
}
function buildEnriched(list, settings) {
  let pop = settings.populasiAwal;
  return [...list].sort((a,b)=>a.tanggal.localeCompare(b.tanggal)).map(rec => {
    const c = hitung(rec,pop); pop = c.popSesudah; return {...rec,...c};
  });
}
function getPopSebelum(list, tanggal, settings) {
  return settings.populasiAwal - list.filter(h=>h.tanggal<tanggal).reduce((s,h)=>s+(h.ayamMati||0),0);
}

// ── CHART COMPONENT ───────────────────────────────────────────
function FarmChart({data,dataKey,color,type='line'}) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(()=>{
    if(!ref.current||!data.length) return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    inst.current = new Chart(ref.current,{
      type:type==='bar'?'bar':'line',
      data:{
        labels:data.map(d=>d.tgl),
        datasets:[{
          data:data.map(d=>d[dataKey]),
          backgroundColor:type==='bar'?color+'55':color+'18',
          borderColor:color,borderWidth:2,fill:type==='line',
          tension:0.3,pointRadius:data.length>20?0:3,pointBackgroundColor:color,
          borderRadius:type==='bar'?4:0
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtN(c.raw,1)}}},
        scales:{
          x:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10,family:'Nunito'}}},
          y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10,family:'Nunito'}}}
        }
      }
    });
    return ()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[JSON.stringify(data.map(d=>d[dataKey])),color,type]);
  if(!data.length) return <div style={{height:140,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569',fontSize:14}}>Belum ada data</div>;
  return <div style={{height:140,position:'relative'}}><canvas ref={ref}/></div>;
}

function RekapPetugasCard({rec,computed,dark}) {
  const {totalBagus,totalBentes,totalSemua,beratBersih,beratPerButir,popSesudah,hd,feedIntake,fcr,stockPeti,komisi,totalGaji} = computed;
  const bg = dark?'rgba(0,0,0,0.2)':'#f9fafb';
  const tc = dark?'#fff':'#111';
  const sc = dark?'rgba(255,255,255,0.6)':'#6b7280';
  const rows = [['🥚 Telur Bagus',fmtN(totalBagus)+' butir'],['🔴 Telur Bentes',fmtN(totalBentes)+' butir'],['📊 Total Semua',fmtN(totalSemua)+' butir'],['⚖️ Berat Bersih',fmtN(beratBersih,3)+' kg'],['📦 Stok Peti',fmtN(stockPeti,2)+' peti'],['🐔 Populasi',fmtN(popSesudah)+' ekor'],['📈 HD',fmtN(hd,1)+'%'],['🌾 Feed Intake',fmtN(feedIntake,1)+' g/ekor'],['📉 FCR',fmtN(fcr,2)],['⚖️ Berat/Butir',fmtN(beratPerButir,1)+' gram']];
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        {rows.map(([k,v])=>(
          <div key={k} style={{background:bg,borderRadius:12,padding:'10px 14px'}}>
            <div style={{fontSize:11,color:sc,fontWeight:700}}>{k}</div>
            <div style={{fontWeight:900,fontSize:15,color:tc,marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{background:dark?'rgba(22,163,74,0.25)':T.greenLight,border:`2px solid ${dark?'#4ade80':'#86efac'}`,borderRadius:14,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:dark?'#4ade80':'#15803d'}}>💼 Gaji Hari Ini</div>
          <div style={{fontSize:12,color:dark?'rgba(255,255,255,0.5)':'#6b7280',fontWeight:600}}>Pokok {Rp(70000)} + Komisi {Rp(Math.round(komisi))}</div>
        </div>
        <div style={{fontWeight:900,fontSize:24,color:dark?'#4ade80':T.green}}>{Rp(Math.round(totalGaji))}</div>
      </div>
    </div>
  );
}

        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ANTHROPIC_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: imgMime, data: imgBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const json = await resp.json();
      if(json.error) {
        const msg = json.error.message || json.error.type || 'Error API';
        if(msg.includes('401')||json.error.type==='authentication_error') throw new Error('API key salah atau tidak valid. Cek kembali ANTHROPIC_KEY di file index.html');
        throw new Error(msg);
      }
      const raw = json.content.map(c=>c.text||'').join('').trim();
      const clean = raw.replace(/```json|```/g,'').trim();
      const records = JSON.parse(clean);
      if(!Array.isArray(records)||records.length===0) throw new Error('Tidak ada data yang bisa dibaca dari gambar ini');
      setExtracted(records);
      setPhase('preview');
    } catch(e) {
      setErrMsg(e.message||'Gagal membaca gambar');
      setPhase('error');
    }
  };

  const simpanSemua = async () => {
    setPhase('saving');
    let count = 0;
    for(const rec of extracted) {
      const ok = await DB.upsertHarian(rec);
      if(ok) count++;
    }
    await onReload();
    setSavedCount(count);
    setPhase('done');
  };

  const reset = () => { setPhase('upload'); setImgBase64(null); setImgPreview(null); setExtracted(null); setErrMsg(''); if(fileRef.current) fileRef.current.value=''; };

  // ── PHASE: UPLOAD ──
  if(phase==='upload'||phase==='ready') return (
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Header info */}
      <div style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)',borderRadius:20,padding:20,textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:8}}>📸✨</div>
        <div style={{color:'#fff',fontWeight:900,fontSize:19,marginBottom:6}}>Import Data dari Foto</div>
        <div style={{color:'rgba(255,255,255,0.8)',fontSize:14,fontWeight:600,lineHeight:1.7}}>
          Upload screenshot Excel atau foto catatan harian.<br/>
          AI akan membaca angka-angkanya otomatis!
        </div>
      </div>

      {/* Tips */}
      <div style={{background:'#fff',borderRadius:16,border:'2px solid #e0e7ff',padding:16}}>
        <div style={{fontWeight:800,color:'#4c1d95',marginBottom:10,fontSize:14}}>💡 Tips foto yang bagus:</div>
        {['Gambar jelas, tidak blur atau gelap','Angka-angka terbaca dengan jelas','Bisa foto dari HP langsung atau screenshot layar','Bisa satu hari atau banyak hari sekaligus'].map(t=>(
          <div key={t} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6}}>
            <span style={{color:'#7c3aed',fontSize:16,flexShrink:0}}>✓</span>
            <span style={{fontSize:13,color:'#374151',fontWeight:600}}>{t}</span>
          </div>
        ))}
      </div>

      {/* Upload area */}
      <div onClick={()=>fileRef.current.click()} style={{background:imgPreview?'#f0fdf4':'#f8f4ff',border:`3px dashed ${imgPreview?'#86efac':'#a78bfa'}`,borderRadius:20,padding:24,textAlign:'center',cursor:'pointer',transition:'all .2s'}}>
        {imgPreview
          ? <img src={imgPreview} style={{maxWidth:'100%',maxHeight:280,borderRadius:12,objectFit:'contain'}}/>
          : <>
              <div style={{fontSize:52,marginBottom:8}}>🖼️</div>
              <div style={{fontWeight:800,fontSize:16,color:'#7c3aed',marginBottom:4}}>Ketuk untuk pilih foto</div>
              <div style={{fontSize:13,color:'#6b7280',fontWeight:600}}>Screenshot Excel atau foto catatan</div>
            </>
        }
        <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{display:'none'}}/>
      </div>

      {imgPreview&&(
        <div style={{display:'flex',gap:10}}>
          <button onClick={reset} style={{flex:1,padding:'14px 0',background:'transparent',border:'2px solid #d1d5db',borderRadius:14,color:'#9ca3af',fontSize:15,fontWeight:700}}>🔄 Ganti Foto</button>
          <button onClick={analisa} style={{flex:2,padding:'14px 0',background:'linear-gradient(135deg,#7c3aed,#6d28d9)',border:'none',borderRadius:14,color:'#fff',fontSize:17,fontWeight:900,boxShadow:'0 6px 20px rgba(124,58,237,0.4)'}}>
            🤖 Analisa AI →
          </button>
        </div>
      )}
    </div>
  );

  // ── PHASE: READING ──
  if(phase==='reading') return (
    <div className="fade" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:400,gap:20}}>
      <div style={{position:'relative',width:100,height:100}}>
        <div style={{width:100,height:100,borderRadius:'50%',border:'4px solid #e0e7ff'}}/>
        <div className="spin" style={{position:'absolute',top:0,left:0,width:100,height:100,borderRadius:'50%',border:'4px solid transparent',borderTopColor:'#7c3aed'}}/>
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:36}}>🤖</div>
      </div>
      <div style={{textAlign:'center'}}>
        <div style={{fontWeight:900,fontSize:19,color:'#4c1d95',marginBottom:6}}>AI sedang membaca foto...</div>
        <div style={{fontSize:14,color:'#6b7280',fontWeight:600}}>Menganalisa angka-angka dari gambar</div>
      </div>
      {imgPreview&&<img src={imgPreview} style={{maxWidth:'80%',maxHeight:160,borderRadius:12,objectFit:'contain',opacity:.6}}/>}
    </div>
  );

  // ── PHASE: ERROR ──
  if(phase==='error') return (
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',borderRadius:20,padding:24,textAlign:'center'}}>
        <div style={{fontSize:52,marginBottom:8}}>😅</div>
        <div style={{color:'#fff',fontWeight:900,fontSize:18,marginBottom:6}}>Gagal Membaca Foto</div>
        <div style={{color:'rgba(255,255,255,0.85)',fontSize:14,fontWeight:600}}>{errMsg}</div>
      </div>
      <div style={{background:'#fef3c7',borderRadius:14,padding:16,border:'2px solid #fcd34d'}}>
        <div style={{fontWeight:800,color:'#78350f',marginBottom:8}}>💡 Coba lagi dengan:</div>
        {['Foto lebih dekat dan jelas','Pastikan angka tidak blur','Screenshot langsung dari layar lebih baik dari foto HP'].map(t=>(
          <div key={t} style={{fontSize:13,color:'#92400e',fontWeight:600,marginBottom:4}}>• {t}</div>
        ))}
      </div>
      <button onClick={reset} style={{padding:'16px 0',background:'linear-gradient(135deg,#7c3aed,#6d28d9)',border:'none',borderRadius:14,color:'#fff',fontSize:17,fontWeight:900,width:'100%'}}>🔄 Coba Lagi</button>
    </div>
  );

  // ── PHASE: PREVIEW ──
  if(phase==='preview'&&extracted) return (
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)',borderRadius:20,padding:18,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{color:'rgba(255,255,255,0.8)',fontSize:12,fontWeight:700}}>AI berhasil membaca</div>
          <div style={{color:'#fff',fontWeight:900,fontSize:22}}>{extracted.length} hari data</div>
        </div>
        <div style={{fontSize:44}}>🎯</div>
      </div>

      <div style={{background:'#fef3c7',border:'2px solid #fcd34d',borderRadius:14,padding:'12px 16px',fontSize:13,color:'#78350f',fontWeight:600}}>
        ⚠️ Cek dulu data di bawah sebelum simpan. Kolom yang kosong (0) bisa diisi manual nanti.
      </div>

      {extracted.map((rec,i) => {
        const beratBersih = (rec.batches||[]).reduce((s,b)=>s+((b.berat||0)-(b.tray||0)*0.205),0);
        const totalBagus = (rec.batches||[]).reduce((s,b)=>s+(b.butir||0),0);
        return (
          <div key={i} style={{background:'#fff',borderRadius:18,border:'2px solid #e0e7ff',overflow:'hidden'}}>
            <div style={{background:'linear-gradient(135deg,#6d28d9,#7c3aed)',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{color:'#fff',fontWeight:900,fontSize:16}}>📅 {fmt(rec.tanggal)}</div>
              <button onClick={()=>setExtracted(prev=>prev.filter((_,j)=>j!==i))} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,color:'#fff',padding:'4px 10px',cursor:'pointer',fontSize:13,fontWeight:700}}>Hapus ✕</button>
            </div>
            <div style={{padding:14}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
                {[['🥚 Butir Bagus',fmtN(totalBagus)+' butir'],['🔴 Bentes',fmtN(rec.bentes)+' butir'],['⚖️ Berat Bersih',fmtN(beratBersih,2)+' kg'],['🌾 Pakan',fmtN(rec.pakan)+' kg'],['💀 Mati',fmtN(rec.ayamMati)+' ekor'],['📦 Stok Peti',fmtN(beratBersih/10,2)+' peti']].map(([k,v])=>(
                  <div key={k} style={{background:'#f8f4ff',borderRadius:10,padding:'8px 10px'}}>
                    <div style={{fontSize:10,color:'#7c3aed',fontWeight:700}}>{k}</div>
                    <div style={{fontWeight:800,fontSize:13,color:'#1f2937',marginTop:2}}>{v}</div>
                  </div>
                ))}
              </div>
              {rec.catatan&&<div style={{fontSize:12,color:'#6b7280',background:'#f9fafb',borderRadius:8,padding:'6px 10px'}}>📝 {rec.catatan}</div>}
              {(rec.hargaDO===0||rec.hargaSak===0)&&(
                <div style={{marginTop:8,fontSize:12,color:'#b45309',fontWeight:600,background:'#fef3c7',borderRadius:8,padding:'6px 10px'}}>
                  ⚠️ Harga DO dan harga pakan belum ada di foto — bisa diisi manual di Input Harian
                </div>
              )}
            </div>
          </div>
        );
      })}

      <div style={{display:'flex',gap:12,position:'sticky',bottom:16}}>
        <button onClick={reset} style={{flex:1,padding:'15px 0',background:'#fff',border:'2px solid #d1d5db',borderRadius:14,color:'#6b7280',fontSize:15,fontWeight:700}}>🔄 Ulangi</button>
        <button onClick={simpanSemua} disabled={extracted.length===0} style={{flex:2,padding:'15px 0',background:extracted.length?'linear-gradient(135deg,#16a34a,#15803d)':'#9ca3af',border:'none',borderRadius:14,color:'#fff',fontSize:17,fontWeight:900}}>
          ✅ Simpan {extracted.length} Data
        </button>
      </div>
    </div>
  );

  // ── PHASE: SAVING ──
  if(phase==='saving') return (
    <div className="fade" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:400,gap:20}}>
      <div className="spin" style={{fontSize:60}}>💾</div>
      <div style={{fontWeight:900,fontSize:19,color:'#15803d'}}>Menyimpan ke database...</div>
    </div>
  );

  // ── PHASE: DONE ──
  if(phase==='done') return (
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:'linear-gradient(135deg,#16a34a,#15803d)',borderRadius:20,padding:28,textAlign:'center',boxShadow:'0 8px 24px rgba(22,163,74,0.3)'}}>
        <div style={{fontSize:64,marginBottom:8}}>🎉</div>
        <div style={{color:'#fff',fontWeight:900,fontSize:22,marginBottom:6}}>{savedCount} Data Berhasil Disimpan!</div>
        <div style={{color:'rgba(255,255,255,0.85)',fontSize:15,fontWeight:600}}>Data sudah masuk ke database dan bisa dilihat di Dashboard Pemilik</div>
      </div>
      <button onClick={reset} style={{padding:'17px 0',background:'linear-gradient(135deg,#7c3aed,#6d28d9)',border:'none',borderRadius:14,color:'#fff',fontSize:17,fontWeight:900,width:'100%',boxShadow:'0 6px 20px rgba(124,58,237,0.3)'}}>
        📸 Import Foto Lagi
      </button>
    </div>
  );

  return null;
}

// PEMILIK VIEW

    <div style={{minHeight:'100vh',background:T.dark}}>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px 0'}}>
          <div>
            <div style={{color:T.muted,fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>Kandang Ayam Mendalanwangi</div>

        <div style={{display:'flex',marginTop:14}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'10px 0',border:'none',background:'transparent',color:tab===t.id?T.amber:T.muted,fontWeight:tab===t.id?900:600,fontSize:11,borderBottom:`3px solid ${tab===t.id?T.amber:'transparent'}`,transition:'all .2s',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <span style={{fontSize:16}}>{t.ico}</span><span>{t.lbl}</span>
            </button>

      <div style={{padding:'16px 14px 80px',color:T.text}}>
        {tab==='dashboard'&&<TabDashboard enriched={enriched}/>}

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}} className="fade">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0'}}>
        <div style={{color:T.muted,fontSize:13,fontWeight:700}}>Data terakhir</div>
        <div style={{background:'#2d3f55',borderRadius:10,padding:'4px 14px',color:T.amber,fontWeight:800,fontSize:14}}>{fmt(last.tanggal)}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {[['🥚','Total Butir',fmtN(last.totalSemua)+' butir','#f59e0b'],['⚖️','Berat Bersih',fmtN(last.beratBersih,3)+' kg','#60a5fa'],['📦','Stok Peti',fmtN(last.stockPeti,2)+' peti','#a78bfa'],['🐔','Populasi',fmtN(last.popSesudah)+' ekor','#34d399'],['📊','HD (Hen Day)',fmtN(last.hd,1)+'%','#fb923c'],['📉','FCR',fmtN(last.fcr,2),'#67e8f9'],['🌾','Feed Intake',fmtN(last.feedIntake,1)+' g/ekor','#86efac'],['💀','Mortality',fmtN(last.mortalityRate,3)+'%','#f87171']].map(([ico,lbl,val,clr])=>(
          <DKpi key={lbl} icon={ico} label={lbl} value={val} color={clr}/>
        ))}
      </div>
      <DCard title={`📋 Detail Lengkap — ${fmt(last.tanggal)}`}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['Telur Bagus',fmtN(last.totalBagus)+' butir'],['Telur Bentes',fmtN(last.totalBentes)+' butir'],['Berat/Butir',fmtN(last.beratPerButir,1)+' gram'],['Pop. Awal Hari',fmtN(last.popSebelum)+' ekor'],['Ayam Mati',fmtN(last.ayamMati)+' ekor'],['Pakan',fmtN(last.pakan,1)+' kg'],['Harga DO',Rp(last.hargaDO)+'/kg'],['Harga Pakan',Rp(last.hargaPakanPerKg)+'/kg']].map(([k,v])=>(
            <div key={k} style={{background:'#0f1923',borderRadius:10,padding:'8px 12px'}}>
              <div style={{fontSize:10,color:T.muted,fontWeight:700}}>{k}</div>
              <div style={{fontWeight:800,fontSize:14,color:T.text,marginTop:2}}>{v}</div>
            </div>
          ))}
        </div>
      </DCard>
      {enriched.length>1&&(
        <DCard title="📅 7 Hari Terakhir">
          {enriched.slice(-7).reverse().map(r=>(
            <div key={r.tanggal} style={{background:'#0f1923',borderRadius:12,padding:'12px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>
              <span style={{color:T.muted,fontSize:13,fontWeight:700}}>{fmt(r.tanggal)}</span>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <Pill color="#f59e0b" text={fmtN(r.totalSemua)+' butir'}/>
                <Pill color="#60a5fa" text={fmtN(r.beratBersih,1)+' kg'}/>
                <Pill color="#fb923c" text={fmtN(r.hd,1)+'% HD'}/>
                {r.ayamMati>0&&<Pill color="#f87171" text={'💀'+r.ayamMati}/>}
              </div>
            </div>
          ))}
        </DCard>
      )}
    </div>
  );
}

function TabGrafik({enriched}) {
  const [range,setRange] = useState('30');
  if(!enriched.length) return <DEmpty text="Belum ada data untuk grafik"/>;
  const chartData = enriched.slice(-parseInt(range)).map(r=>({tgl:r.tanggal.slice(5),butir:r.totalSemua,berat:+r.beratBersih.toFixed(2),hd:+r.hd.toFixed(1),mati:r.ayamMati,fcr:+r.fcr.toFixed(2),intake:+r.feedIntake.toFixed(1),pop:r.popSesudah,peti:+r.stockPeti.toFixed(2)}));
  const charts = [['🥚 Jumlah Butir Telur','butir','#f59e0b','bar'],['⚖️ Berat Bersih (kg)','berat','#60a5fa','line'],['📦 Stok Peti','peti','#a78bfa','bar'],['📊 HD — Hen Day (%)','hd','#fb923c','line'],['🌾 Feed Intake (g/ekor)','intake','#86efac','line'],['📉 FCR','fcr','#67e8f9','line'],['💀 Kematian Ayam','mati','#f87171','bar'],['🐔 Populasi Ayam','pop','#34d399','line']];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}} className="fade">
      <div style={{display:'flex',gap:6,paddingTop:6}}>
        {[['7','7H'],['14','14H'],['30','30H'],['90','3B']].map(([v,l])=>(
          <button key={v} onClick={()=>setRange(v)} style={{padding:'8px 18px',fontSize:13,border:'none',borderRadius:10,background:range===v?T.amber:T.card,color:range===v?T.amberDark:T.muted,fontWeight:800}}>{l}</button>
        ))}
      </div>
      {charts.map(([title,key,color,type])=>(
        <DCard key={key} title={title}><FarmChart data={chartData} dataKey={key} color={color} type={type}/></DCard>
      ))}
    </div>
  );
}

function TabPenjualan({data,onReload}) {
  const [saving,setSaving] = useState(null);
  const sorted = [...data.penjualan].sort((a,b)=>b.tanggal.localeCompare(a.tanggal));
  const totalLunas = sorted.filter(p=>p.statusBayar==='lunas').reduce((s,p)=>s+p.jumlahPeti*10*p.hargaDO,0);
  const totalBelum = sorted.filter(p=>p.statusBayar!=='lunas').reduce((s,p)=>s+p.jumlahPeti*10*p.hargaDO,0);
  const toggle = async id=>{
    setSaving(id);
    const cur = data.penjualan.find(p=>p.id===id);
    await DB.updatePenjualanStatus(id,cur.statusBayar==='lunas'?'belum lunas':'lunas');
    await onReload();setSaving(null);
  };
  const hapus = async id=>{
    if(!confirm('Hapus data penjualan ini?')) return;
    setSaving(id);await DB.deletePenjualan(id);await onReload();setSaving(null);
  };
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}} className="fade">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,paddingTop:6}}>
        <DKpi icon="✅" label="Total Lunas" value={Rp(totalLunas)} color="#34d399"/>
        <DKpi icon="⏳" label="Belum Lunas" value={Rp(totalBelum)} color="#f87171"/>
      </div>
      {sorted.length===0?<DEmpty text="Belum ada data penjualan"/>:sorted.map(p=>{
        const total=p.jumlahPeti*10*p.hargaDO,lunas=p.statusBayar==='lunas';
        return (
          <div key={p.id} style={{background:T.card,borderRadius:16,padding:16,borderLeft:`4px solid ${lunas?'#34d399':'#f87171'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <span style={{color:lunas?'#34d399':'#f87171',fontWeight:800,fontSize:14}}>{fmt(p.tanggal)}</span>
              <span style={{fontWeight:900,fontSize:20,color:T.text}}>{Rp(total)}</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
              {[['Jumlah',fmtN(p.jumlahPeti,1)+' peti'],['Harga DO',Rp(p.hargaDO)+'/kg'],['Pembeli',p.nama||'-']].map(([k,v])=>(
                <div key={k}><div style={{color:T.muted,fontSize:10,fontWeight:700}}>{k}</div><div style={{color:T.text,fontWeight:700,fontSize:14}}>{v}</div></div>
              ))}
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>toggle(p.id)} disabled={saving===p.id} style={{flex:1,padding:'9px 0',border:`2px solid ${lunas?'#34d399':'#f87171'}`,borderRadius:10,background:'transparent',color:lunas?'#34d399':'#f87171',fontSize:13,fontWeight:800}}>
                {saving===p.id?'...':(lunas?'✅ Lunas':'⏳ Belum Lunas')} (ubah)
              </button>
              <button onClick={()=>hapus(p.id)} disabled={saving===p.id} style={{padding:'9px 16px',border:`2px solid ${T.border}`,borderRadius:10,background:'transparent',color:T.muted,fontSize:14}}>🗑️</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TabGaji({enriched,data}) {
  const [filter,setFilter] = useState('bulan');
  const thisMonth = new Date().toISOString().slice(0,7);
  const filtered = filter==='bulan'?enriched.filter(r=>r.tanggal.slice(0,7)===thisMonth):enriched.slice(-7);
  const totalPokok = filtered.length*70000;
  const totalKomisi = filtered.reduce((s,r)=>s+r.komisi,0);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}} className="fade">
      <div style={{display:'flex',gap:8,paddingTop:6}}>
        {[['bulan','Bulan Ini'],['7','7 Hari']].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:'10px 20px',fontSize:13,border:'none',borderRadius:10,background:filter===v?T.amber:T.card,color:filter===v?T.amberDark:T.muted,fontWeight:800}}>{l}</button>
        ))}
      </div>
      <div style={{background:'linear-gradient(135deg,#16a34a,#15803d)',borderRadius:20,padding:'20px 22px'}}>
        <div style={{color:'rgba(255,255,255,0.7)',fontSize:13,fontWeight:700,marginBottom:4}}>💰 Total Gaji Periode Ini</div>
        <div style={{color:'#fff',fontWeight:900,fontSize:34}}>{Rp(Math.round(totalPokok+totalKomisi))}</div>
        <div style={{color:'rgba(255,255,255,0.7)',fontSize:13,fontWeight:700,marginTop:6}}>{filtered.length} hari kerja · Pokok {Rp(totalPokok)} · Komisi {Rp(Math.round(totalKomisi))}</div>
      </div>
      <DCard title="ℹ️ Rumus Gaji">
        <div style={{fontSize:13,color:T.muted,lineHeight:2,fontWeight:600}}>
          <div>📌 Gaji pokok = <b style={{color:T.text}}>Rp 70.000 / hari</b></div>
          <div>📌 Komisi = <b style={{color:T.amber}}>4% × ((Berat × Harga DO) − (Pakan × Harga Pakan/kg))</b></div>
          <div>📌 Harga pakan diinput petugas tiap hari (harga sak ÷ 50 kg)</div>
        </div>
      </DCard>
      {filtered.length===0?<DEmpty text="Belum ada data"/>:(
        <DCard title="📋 Detail Per Hari">
          {[...filtered].reverse().map(r=>(
            <div key={r.tanggal} style={{background:'#0f1923',borderRadius:12,padding:'12px 14px',marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{color:T.muted,fontSize:13,fontWeight:700}}>{fmt(r.tanggal)}</span>
                <span style={{color:'#4ade80',fontWeight:900,fontSize:17}}>{Rp(Math.round(r.totalGaji))}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
                {[['Pokok',Rp(70000),T.text],['Komisi',Rp(Math.round(r.komisi)),'#4ade80'],['Berat',fmtN(r.beratBersih,2)+' kg',T.text],['Harga DO',Rp(r.hargaDO),T.text]].map(([k,v,c])=>(
                  <div key={k}><div style={{color:T.muted,fontSize:10,fontWeight:700}}>{k}</div><div style={{color:c,fontWeight:700,fontSize:13}}>{v}</div></div>
                ))}
              </div>
            </div>
          ))}
        </DCard>
      )}
    </div>
  );
}

function TabSetting({data,onReload}) {
  const [form,setForm] = useState({...data.settings});
  const [saving,setSaving] = useState(false);
  const [saved,setSaved] = useState(false);
  const simpan = async()=>{
    setSaving(true);
    await DB.saveSettings({...form,populasiAwal:parseInt(form.populasiAwal)||0});
    await onReload();setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  const inp2 = {fontSize:18,border:`2px solid ${T.border}`,borderRadius:12,padding:'13px 16px',width:'100%',background:'#0f1923',color:T.text,outline:'none',fontWeight:700};
  return (
    <div style={{paddingTop:8,display:'flex',flexDirection:'column',gap:14}} className="fade">
      {saved&&<div style={{background:'#1a3a2a',border:'2px solid #34d399',borderRadius:12,padding:'12px 18px',color:'#34d399',fontWeight:800,textAlign:'center'}}>✅ Pengaturan tersimpan!</div>}
      <DCard title="🐔 Populasi Ayam Awal">
        <div style={{color:T.muted,fontSize:13,marginBottom:10,fontWeight:600}}>Jumlah ayam saat sistem pertama dipakai</div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input type="number" min="0" value={form.populasiAwal} onChange={e=>setForm(f=>({...f,populasiAwal:e.target.value}))} style={inp2}/>
          <span style={{color:T.muted,flexShrink:0,fontWeight:700}}>ekor</span>
        </div>
      </DCard>
      <DCard title="🔐 PIN Pemilik">
        <input type="password" maxLength={6} value={form.pin} onChange={e=>setForm(f=>({...f,pin:e.target.value}))} style={{...inp2,letterSpacing:12,textAlign:'center',fontSize:30}}/>
        <div style={{color:T.muted,fontSize:12,marginTop:8,fontWeight:600}}>Maksimal 6 digit angka</div>
      </DCard>
      <button onClick={simpan} disabled={saving} style={{padding:'18px 0',background:`linear-gradient(135deg,${T.amber},${T.amberDark})`,border:'none',borderRadius:14,color:T.amberDark,fontSize:17,fontWeight:900,width:'100%',boxShadow:`0 6px 20px ${T.amber}33`}}>
        {saving?'⏳ Menyimpan...':'💾 Simpan Pengaturan'}
      </button>
    </div>
  );
}

// ── SHARED COMPONENTS ─────────────────────────────────────────
const BtnS = (bg,extra={}) => ({padding:'17px 0',background:bg,border:'none',borderRadius:14,color:bg==='transparent'?'#9ca3af':'#fff',fontSize:17,fontWeight:900,width:'100%',boxShadow:bg!=='transparent'&&bg!=='#9ca3af'?`0 6px 18px ${bg}44`:'none',...extra});
function DCard({title,children}) {
  return <div style={{background:T.card,borderRadius:18,padding:16,border:`1px solid ${T.border}`}}><div style={{fontWeight:800,color:T.amber,marginBottom:12,fontSize:14}}>{title}</div>{children}</div>;
}
function DKpi({icon,label,value,color}) {
  return <div style={{background:T.card,borderRadius:14,padding:'14px 12px',border:`1px solid ${T.border}`}}><div style={{fontSize:22,marginBottom:6}}>{icon}</div><div style={{color:T.muted,fontSize:11,fontWeight:700,marginBottom:4}}>{label}</div><div style={{color,fontWeight:900,fontSize:15,lineHeight:1.2}}>{value}</div></div>;
}
function DEmpty({text}) {
  return <div style={{background:T.card,borderRadius:18,padding:'48px 20px',textAlign:'center',marginTop:8}}><div style={{fontSize:44,marginBottom:12}}>🐣</div><div style={{color:T.muted,fontSize:15,fontWeight:600}}>{text}</div></div>;
}
function Pill({color,text}) {
  return <span style={{background:color+'18',border:`1px solid ${color}44`,borderRadius:8,padding:'3px 9px',color,fontSize:12,fontWeight:800}}>{text}</span>;
}

// ── RENDER ────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
